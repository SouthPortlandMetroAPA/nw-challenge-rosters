<style>
/* ==========================================================================
   CSS Reset & Variables
   ========================================================================== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c2b280;
  --primary-dark: #b5a574;
  --bg: #f5f0e8;
  --text: #000;
  --card: #fff;
  --muted: #666;
  --border: #d4c9a8;
  --radius: 10px;
  --spacing: 4px;
  --success: #2e7d32;
  --danger: #c0392b;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

html { font-size: 16px; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
}

/* ==========================================================================
   Header with Wave
   ========================================================================== */
.header {
  background: var(--primary);
  padding: 24px 16px 32px;
  text-align: center;
  position: relative;
}

.header h1 {
  font-size: clamp(1.25rem, 1rem + 1.5vw, 1.75rem);
  font-weight: 700;
  color: var(--text);
}

.header .subtitle {
  font-size: clamp(0.9rem, 0.75rem + 0.8vw, 1.15rem);
  font-weight: 500;
  color: rgba(0,0,0,0.7);
  margin-top: 4px;
}

.header-wave {
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 100%;
  height: 20px;
  overflow: hidden;
}

.header-wave svg {
  display: block;
  width: 100%;
  height: 100%;
}

/* ==========================================================================
   Tab Navigation
   ========================================================================== */
.tabs {
  display: flex;
  gap: 0;
  background: var(--card);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.tab-btn {
  flex: 1;
  min-width: 0;
  padding: 12px 8px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: clamp(0.75rem, 0.65rem + 0.5vw, 0.95rem);
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  text-align: center;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color 0.2s, border-color 0.2s;
  min-height: 48px;
}

.tab-btn:hover {
  color: var(--text);
}

.tab-btn.active {
  color: var(--text);
  border-bottom-color: var(--primary-dark);
}

/* ==========================================================================
   Tab Content
   ========================================================================== */
.tab-panel {
  display: none;
  flex: 1;
}

.tab-panel.active {
  display: block;
}

/* ==========================================================================
   Search & Controls
   ========================================================================== */
.controls {
  padding: 16px;
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
}

.search-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 200px;
  padding: 10px 12px 10px 40px;
  font-size: 1rem;
  font-family: inherit;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card);
  outline: none;
  transition: border-color 0.2s;
}

.search-box:focus {
  border-color: var(--primary-dark);
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
  font-size: 1rem;
}

.team-count {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  font-size: 0.85rem;
  font-weight: 600;
  background: var(--primary);
  color: var(--text);
  border-radius: 20px;
  white-space: nowrap;
}

/* ==========================================================================
   Card Grid
   ========================================================================== */
.roster-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  padding: 0 16px 24px;
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
}

@media (min-width: 768px) {
  .roster-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 1200px) {
  .roster-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ==========================================================================
   Team Card
   ========================================================================== */
.team-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, transform 0.15s;
}

@media (hover: hover) {
  .team-card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    transform: translateY(-2px);
  }
}

.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.seed-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 28px;
  padding: 0 6px;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--card);
  background: var(--text);
  border-radius: 6px;
  flex-shrink: 0;
}

.team-name {
  flex: 1;
  font-weight: 700;
  font-size: 0.95rem;
  line-height: 1.3;
  min-width: 0;
  overflow-wrap: break-word;
}

.sl-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  height: 24px;
  padding: 0 8px;
  font-size: 0.75rem;
  font-weight: 700;
  color: #fff;
  border-radius: 12px;
  flex-shrink: 0;
  white-space: nowrap;
}

.card-players {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

.player-name {
  font-size: 0.85rem;
  color: var(--text);
  padding-left: 4px;
}

.player-name::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
  margin-right: 8px;
  vertical-align: middle;
}

/* ==========================================================================
   Flight badges (3-Person Team)
   ========================================================================== */
.flight-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: 8px;
  vertical-align: middle;
}
.flight-badge.early { background: #1b5e20; color: #c8e6c9; }
.flight-badge.late { background: #1a237e; color: #c5cae9; }

/* Flight filter pills */
.flight-filter {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.flight-pill {
  min-height: 36px;
  padding: 6px 16px;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: inherit;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
}
.flight-pill:hover { background: #faf8f3; }
.flight-pill.active {
  background: var(--primary);
  border-color: var(--primary-dark);
  color: #000;
}

/* Player SL in 3-person cards */
.player-sl {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--primary-dark);
  margin-left: 6px;
}

/* ==========================================================================
   Coming Soon Placeholder
   ========================================================================== */
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 64px 16px;
  text-align: center;
  color: var(--muted);
}

.placeholder-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.5;
}

.placeholder h2 {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.placeholder p {
  font-size: 0.95rem;
}

/* ==========================================================================
   No Results
   ========================================================================== */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 48px 16px;
  color: var(--muted);
  font-size: 1rem;
}

/* ==========================================================================
   Footer
   ========================================================================== */
.footer {
  text-align: center;
  padding: 20px 16px;
  font-size: 0.8rem;
  color: var(--muted);
  border-top: 1px solid var(--border);
  margin-top: auto;
}
</style>

  /* =====================================================================
     Parse raw data into structured objects.
     Regex: #SEED TeamName SL N\tPlayer1\tPlayer2
     ===================================================================== */
  var LINE_RE = /^#(\d+)\s+(.+?)\s+SL\s+(\d+)\t(.+?)\t(.+)$/;

  function parseRoster(rawLines) {
    var teams = [];
    for (var i = 0; i < rawLines.length; i++) {
      var m = LINE_RE.exec(rawLines[i]);
      if (m) {
        teams.push({
          seed: parseInt(m[1], 10),
          name: m[2],
          sl: parseInt(m[3], 10),
          player1: m[4],
          player2: m[5]
        });
      }
    }
    return teams;
  }

  /* =====================================================================
     Compute SL badge color.
     Low SL (4-5) = green, mid (6-8) = gold, high (9-12) = red.
     Uses HSL interpolation: 120 (green) -> 40 (gold) -> 0 (red).
     ===================================================================== */
  function slColor(sl) {
    var MIN_SL = 4, MAX_SL = 12;
    var t = (sl - MIN_SL) / (MAX_SL - MIN_SL); // 0 = low, 1 = high
    t = Math.max(0, Math.min(1, t));
    // Hue: 120 (green) down to 0 (red)
    var hue = Math.round(120 * (1 - t));
    return 'hsl(' + hue + ', 65%, 40%)';
  }

  /* =====================================================================
     Render a team card as an HTML string.
     ===================================================================== */
  function cardHTML(team) {
    return '<div class="team-card" data-search="' + escAttr(
        team.name.toLowerCase() + ' ' +
        team.player1.toLowerCase() + ' ' +
        team.player2.toLowerCase()
      ) + '">' +
      '<div class="card-header">' +
        '<span class="seed-badge">#' + team.seed + '</span>' +
        '<span class="team-name">' + esc(team.name) + '</span>' +
        '<span class="sl-badge" style="background:' + slColor(team.sl) + '">SL ' + team.sl + '</span>' +
      '</div>' +
      '<div class="card-players">' +
        '<span class="player-name">' + esc(team.player1) + '</span>' +
        '<span class="player-name">' + esc(team.player2) + '</span>' +
      '</div>' +
    '</div>';
  }

  /* =====================================================================
     Render an entire roster into a grid container.
     ===================================================================== */
  function renderRoster(teams, gridId, countId) {
    var grid = document.getElementById(gridId);
    var count = document.getElementById(countId);
    var html = '';
    for (var i = 0; i < teams.length; i++) {
      html += cardHTML(teams[i]);
    }
    grid.innerHTML = html;
    count.textContent = teams.length + ' teams';
  }

  /* =====================================================================
     Search / filter handler.
     Filters cards in-DOM by toggling display based on data-search attribute.
     ===================================================================== */
  function setupSearch(searchId, gridId, countId) {
    var input = document.getElementById(searchId);
    if (!input) return;
    input.addEventListener('input', function () {
      var q = this.value.toLowerCase().trim();
      var grid = document.getElementById(gridId);
      var cards = grid.querySelectorAll('.team-card');
      var visible = 0;
      for (var i = 0; i < cards.length; i++) {
        var match = !q || cards[i].getAttribute('data-search').indexOf(q) !== -1;
        cards[i].style.display = match ? '' : 'none';
        if (match) visible++;
      }
      document.getElementById(countId).textContent = visible + ' teams';
      // Show/remove no-results message
      var existing = grid.querySelector('.no-results');
      if (visible === 0 && !existing) {
        var msg = document.createElement('div');
        msg.className = 'no-results';
        msg.textContent = 'No teams match your search.';
        grid.appendChild(msg);
      } else if (visible > 0 && existing) {
        existing.remove();
      }
    });
  }

  /* =====================================================================
     HTML-escape helpers.
     ===================================================================== */
  function esc(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function escAttr(s) {
    return esc(s).replace(/"/g, '&quot;');
  }

  /* =====================================================================
     Tab switching with hash routing.
     ===================================================================== */
  var TAB_IDS = ['early-bird', '3-person', 'weekender'];
  var tabBtns = document.querySelectorAll('.tab-btn');
  var panels = document.querySelectorAll('.tab-panel');

  function activateTab(id) {
    if (TAB_IDS.indexOf(id) === -1) id = 'early-bird';
    for (var i = 0; i < tabBtns.length; i++) {
      var isActive = tabBtns[i].getAttribute('data-tab') === id;
      tabBtns[i].classList.toggle('active', isActive);
      tabBtns[i].setAttribute('aria-selected', isActive ? 'true' : 'false');
    }
    for (var j = 0; j < panels.length; j++) {
      panels[j].classList.toggle('active', panels[j].id === 'panel-' + id);
    }
  }

  // Click handler for tab buttons
  for (var i = 0; i < tabBtns.length; i++) {
    tabBtns[i].addEventListener('click', function () {
      var id = this.getAttribute('data-tab');
      location.hash = '#' + id;
      activateTab(id);
    });
  }

  // Listen for hash changes (back/forward nav)
  window.addEventListener('hashchange', function () {
    var h = location.hash.replace('#', '');
    activateTab(h);
  });

  /* =====================================================================
     Parse 3-person data into structured objects.
     ===================================================================== */
  function parse3Person(rawLines) {
    var teams = [];
    for (var i = 0; i < rawLines.length; i++) {
      var parts = rawLines[i].split('\t');
      if (parts.length < 8) continue;
      var totalSL = parseInt(parts[3],10) + parseInt(parts[5],10) + parseInt(parts[7],10);
      teams.push({
        flight: parts[0].trim().toLowerCase(),
        name: parts[1].trim(),
        p1: parts[2].trim(), p1sl: parts[3].trim(),
        p2: parts[4].trim(), p2sl: parts[5].trim(),
        p3: parts[6].trim(), p3sl: parts[7].trim(),
        totalSL: totalSL
      });
    }
    return teams;
  }

  function card3PHTML(team, idx) {
    var flightCls = team.flight === 'early' ? 'early' : 'late';
    var flightLabel = team.flight === 'early' ? 'Early' : 'Late';
    return '<div class="team-card" data-search="' + escAttr(
        team.name.toLowerCase() + ' ' +
        team.p1.toLowerCase() + ' ' +
        team.p2.toLowerCase() + ' ' +
        team.p3.toLowerCase()
      ) + '" data-flight="' + flightCls + '">' +
      '<div class="card-header">' +
        '<span class="seed-badge">#' + (idx + 1) + '</span>' +
        '<span class="team-name">' + esc(team.name) + '</span>' +
        '<span class="flight-badge ' + flightCls + '">' + flightLabel + '</span>' +
      '</div>' +
      '<div class="card-players">' +
        '<span class="player-name">' + esc(team.p1) + '<span class="player-sl"> SL' + esc(team.p1sl) + '</span></span>' +
        '<span class="player-name">' + esc(team.p2) + '<span class="player-sl"> SL' + esc(team.p2sl) + '</span></span>' +
        '<span class="player-name">' + esc(team.p3) + '<span class="player-sl"> SL' + esc(team.p3sl) + '</span></span>' +
      '</div>' +
    '</div>';
  }

  function render3Person(teams, gridId, countId) {
    var grid = document.getElementById(gridId);
    var count = document.getElementById(countId);
    var html = '';
    for (var i = 0; i < teams.length; i++) {
      html += card3PHTML(teams[i], i);
    }
    grid.innerHTML = html;
    count.textContent = teams.length + ' teams';
  }

  var current3PFlight = 'all';
  var threePersonTeams = parse3Person(RAW_3_PERSON);

  function filter3P(flight, btn) {
    current3PFlight = flight;
    var pills = document.querySelectorAll('.flight-filter .flight-pill');
    for (var i = 0; i < pills.length; i++) {
      pills[i].classList.toggle('active', pills[i].getAttribute('data-flight') === flight);
    }
    apply3PFilter();
  }

  function apply3PFilter() {
    var grid = document.getElementById('grid-3-person');
    var cards = grid.querySelectorAll('.team-card');
    var q = (document.getElementById('search-3-person').value || '').toLowerCase().trim();
    var visible = 0;
    for (var i = 0; i < cards.length; i++) {
      var matchFlight = current3PFlight === 'all' || cards[i].getAttribute('data-flight') === current3PFlight;
      var matchSearch = !q || cards[i].getAttribute('data-search').indexOf(q) !== -1;
      var show = matchFlight && matchSearch;
      cards[i].style.display = show ? '' : 'none';
      if (show) visible++;
    }
    document.getElementById('count-3-person').textContent = visible + ' teams';
  }

  /* =====================================================================
     Init: parse data, render, set active tab from URL hash.
     ===================================================================== */
  var earlyBirdTeams = parseRoster(RAW_EARLY_BIRD);
  renderRoster(earlyBirdTeams, 'grid-early-bird', 'count-early-bird');
  setupSearch('search-early-bird', 'grid-early-bird', 'count-early-bird');

  render3Person(threePersonTeams, 'grid-3-person', 'count-3-person');
  document.getElementById('search-3-person').addEventListener('input', apply3PFilter);

  // Activate tab from hash, default to early-bird
  var initHash = location.hash.replace('#', '') || 'early-bird';
  activateTab(initHash);

})();
